<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arlee</title>
    <link rel="stylesheet" href="./assets/styles/index.css">
</head>
<body>
    <header class="header" id="header">
        <div class="container header__container">
            <div class="header__logo">
                <a href="#" class="header__logo_img">
                    <img src="./assets/images/Arlee -logo.svg" alt="Логотип Arlee">
                </a>
            </div>
            <nav class="header__nav">
                <ul class="header__menu">
                    <li class="header__menu_list"><a href="#">О нас</a></li>
                    <li class="header__menu_list"><a href="#">Новости</a></li>
                    <li class="header__menu_list"><a href="#">Персонал</a></li>
                    <li class="header__menu_list"><a href="#">Сотрудничество</a></li>
                    <li class="header__menu_list"><a href="#">Контакты</a></li>
                </ul>
            </nav>
            <button class="header__btn">Написать в WhatsApp</button>
        </div>
    </header>
   <section class="hero" id="hero">
  <div class="container">
    <h1 class="hero__title">Качественный персонал - залог вашего комфорта</h1>
    
    <form class="hero__form">
      <div class="hero__search-group">
        <svg class="hero__icon" width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="11" cy="11" r="7" stroke="#344454" stroke-width="2"/>
          <path d="M20 20L16 16" stroke="#344454" stroke-width="2" stroke-linecap="round"/>
        </svg>

        <input type="search" class="hero__input" placeholder="Найти свой идеальный персонал">
        
        <button class="hero__btn" type="submit">поиск</button>
      </div>
    </form>
  </div>
</section>
</body>
</html>
